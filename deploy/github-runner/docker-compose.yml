# GitHub Actions self-hosted runner for Synology Container Manager.
# 1. Get a registration token from GitHub repo → Settings → Actions → Runners → New
# 2. Copy .env.example to .env and set RUNNER_TOKEN
# 3. docker compose up -d

services:
  github-runner:
    image: ghcr.io/actions/actions-runner:latest
    container_name: ryder-github-runner
    restart: unless-stopped
    environment:
      RUNNER_NAME: ${RUNNER_NAME:-synology-ryder}
      RUNNER_TOKEN: ${RUNNER_TOKEN}
      RUNNER_REPOSITORY: ${GITHUB_REPO:-GreenOliverJ/ryder-collective}
      RUNNER_LABELS: self-hosted,synology,linux
      RUNNER_WORK_DIRECTORY: /tmp/runner-work
      DISABLE_RUNNER_UPDATE: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/home/runner
      - /volume1/docker/ryder-collective:/volume1/docker/ryder-collective
    network_mode: bridge
