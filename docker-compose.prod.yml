# Production stack for Synology NAS (Container Manager) or any Docker host.
# Usage: cp .env.production.example .env.production && docker compose -f docker-compose.prod.yml up -d --build

services:
  mongodb:
    image: mongo:7
    container_name: ryder-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ryder
    volumes:
      - ./data/mongo:/data/db
    networks:
      - ryder
    # MongoDB is NOT exposed to the LAN — only backend can reach it.

  backend:
    build:
      context: .
      dockerfile: packages/ryder-backend/Dockerfile
    container_name: ryder-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongodb:27017/ryder
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${PUBLIC_URL}
      UPLOAD_DIR: uploads
    volumes:
      - ./data/uploads:/app/packages/ryder-backend/uploads
    depends_on:
      mongodb:
        condition: service_started
    networks:
      - ryder

  web:
    build:
      context: .
      dockerfile: packages/ryder-front/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ryder-web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - ryder

networks:
  ryder:
    driver: bridge
