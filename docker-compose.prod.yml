# Production stack for Synology NAS (Container Manager) or any Docker host.
# Usage: cp .env.production.example .env.production && docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  mongodb:
    # DS1019+ (Celeron J4125 etc.) has no AVX — MongoDB 5+ will not start. Use 4.4.
    image: mongo:4.4.29
    container_name: ryder-mongodb
    hostname: ryder-mongodb
    restart: unless-stopped
    command: ['mongod', '--wiredTigerCacheSizeGB', '0.5']
    environment:
      MONGO_INITDB_DATABASE: ryder
    volumes:
      # Named volume avoids Synology bind-mount "read-only /data/db" permission issues.
      - ryder-mongo-data:/data/db
    networks:
      ryder:
        aliases:
          - mongodb
          - ryder-mongodb
    healthcheck:
      test: ['CMD-SHELL', 'mongo --quiet --eval "db.adminCommand({ ping: 1 })"']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: .
      dockerfile: packages/ryder-backend/Dockerfile
    container_name: ryder-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://ryder-mongodb:27017/ryder
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${PUBLIC_URL}
      UPLOAD_DIR: uploads
    volumes:
      - ./data/uploads:/app/packages/ryder-backend/uploads
    depends_on:
      mongodb:
        condition: service_started
    networks:
      - ryder
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:4000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: packages/ryder-front/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ryder-web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - ryder

networks:
  ryder:
    name: ryder-collective-net
    driver: bridge

volumes:
  ryder-mongo-data:
